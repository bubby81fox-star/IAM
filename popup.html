<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM BROWSER ADDON</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f9fafb;
      color: #111827;
    }
    .container {
      text-align: center;
    }
    .header {
      margin-bottom: 24px;
    }
    .company-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin: 0;
    }
    .app-title {
      font-size: 18px;
      font-weight: 700;
      margin: 4px 0 0 0;
      color: #1f2937;
    }
    .status-box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    .status-text {
      font-size: 14px;
      margin: 0;
      color: #4b5563;
    }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background-color: #6366f1; /* Modern Indigo */
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #4f46e5;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <p class="company-title">Xtensible Web & App</p>
      <h1 class="app-title">Identity Manager</h1>
    </div>

    <div class="status-box">
      <div id="logged-out-state">
        <p class="status-text" style="margin-bottom: 16px;">Please sign in to securely sync your environment credentials.</p>
        <button id="login-btn" class="btn">Sign In with Auth0</button>
      </div>

      <div id="logged-in-state" class="hidden">
        <p class="status-text" style="color: #10b981; font-weight: 600; margin-bottom: 8px;">✓ Securely Authenticated</p>
        <p id="user-email" class="status-text" style="font-size: 12px; word-break: break-all;"></p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
