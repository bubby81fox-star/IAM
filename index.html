<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IAM BROWSER ADDON</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      box-sizing: border-box;
    }
    .container {
      text-align: center;
    }
    .header {
      margin-bottom: 24px;
    }
    .company-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin: 0;
    }
    .app-title {
      font-size: 20px;
      font-weight: 700;
      margin: 4px 0 0 0;
      color: #1f2937;
    }
    .status-box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .status-text {
      font-size: 14px;
      margin: 0;
      color: #4b5563;
      line-height: 1.5;
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background-color: #6366f1;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #4f46e5;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <p class="company-title">Xtensible Web & App</p>
      <h1 class="app-title">Identity Manager</h1>
    </div>

    <div class="status-box">
      <div id="logged-out-state">
        <p class="status-text" style="margin-bottom: 20px;">Securely authenticate into your development environment grid.</p>
        <button id="login-btn" class="btn">Sign In with Auth0</button>
      </div>

      <div id="logged-in-state" class="hidden">
        <p class="status-text" style="color: #10b981; font-weight: 600; margin-bottom: 8px;">✓ Authenticated successfully</p>
        <p id="user-display" class="status-text" style="font-size: 13px; font-weight: bold; word-break: break-all; color: #111827;"></p>
        <button id="logout-btn" class="btn" style="background-color: #ef4444; margin-top: 16px;">Sign Out</button>
      </div>
    </div>
  </div>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
      const AUTH0_DOMAIN = "dev-t0zgk43t61c80h7q.us.auth0.com";
      const CLIENT_ID = "amkFoQPZtek3eDKm1zsPiW034R2Cjn4I";
      const REDIRECT_URI = "https://bubby81fox-star.github.io/IAM";

      // Live Supabase Grid Parameters
      const SUPABASE_URL = "https://ppzbmpyhikkrahonwpm.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwemJtcHloaWtrcmFocW9ud3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MDY1MzYsImV4cCI6MjA5NDk4MjUzNn0.csWZWPpF60JMecwAaMqDVCiuhp8SbxEstOkGoS1csp4";
      const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const loggedOutState = document.getElementById("logged-out-state");
      const loggedInState = document.getElementById("logged-in-state");
      const userDisplay = document.getElementById("user-display");

      // 1. PARSE INCOMING TOKENS FROM THE URL REDIRECT
      const hash = window.location.hash.substring(1);
      if (hash) {
        const urlParams = new URLSearchParams(hash);
        const idToken = urlParams.get("id_token");

        if (idToken) {
          localStorage.setItem("id_token", idToken);
          window.location.hash = ""; // Clean URL bar
        }
      }

      // 2. ACTIVATE USER SESSION AND SYNC WITH SUPABASE
      const savedToken = localStorage.getItem("id_token");
      if (savedToken) {
        try {
          // Decode user data for local UI display
          const base64Url = savedToken.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const tokenData = JSON.parse(atob(base64));
          
          loggedOutState.classList.add("hidden");
          loggedInState.classList.remove("hidden");
          userDisplay.textContent = tokenData.name || tokenData.email || "Eric Fraschilla";

          // Securely pass the Auth0 JWT directly to Supabase
          const { data, error } = await supabase.auth.setSession({
            access_token: savedToken,
            refresh_token: ""
          });

          if (error) console.error("Supabase Session sync error:", error.message);
          else console.log("Supabase and Auth0 successfully synced grid parameters.");

        } catch (e) {
          console.error("Token setup error:", e);
        }
      }

      // 3. TRIGGER LOGIN
      loginBtn.addEventListener("click", () => {
        loginBtn.textContent = "Connecting to Grid...";
        loginBtn.disabled = true;

        const authUrl = `https://${AUTH0_DOMAIN}/authorize?` + 
                        `client_id=${CLIENT_ID}&` +
                        `response_type=id_token&` + 
                        `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
                        `scope=openid%20profile%20email&` +
                        `nonce=xtensible_secure_string_123&` +
                        `prompt=login`;

        window.location.href = authUrl;
      });

      // 4. LOGOUT
      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("id_token");
        window.location.href = `https://${AUTH0_DOMAIN}/v2/logout?client_id=${CLIENT_ID}&returnTo=${encodeURIComponent(REDIRECT_URI)}`;
      });
    });
  </script>
</body>
</html>
