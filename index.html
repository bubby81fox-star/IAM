<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IAM - Angels No Demons</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#050505;color:#f3f4f6;height:100vh;display:flex;flex-direction:column}
header{padding:16px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center;background:#0d0e12}
h1{font-size:18px;letter-spacing:1px;color:#e5e7eb}
.tabs{display:flex;background:#0d0e12;border-bottom:1px solid #1f2937}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;color:#4b5563;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.5px}
.tab.active{color:#c084fc;border-bottom:2px solid #c084fc;background:#111319}
main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.card{background:#111319;border:1px solid #1f2937;border-radius:12px;padding:16px}
.spiritual-banner{background:linear-gradient(135deg, #2e1065, #111319);border:1px solid #581c87;position:relative}
.angel-response{color:#a78bfa;font-style:italic;margin-top:8px;font-size:14px;line-height:1.5}
.scripture{font-size:11px;color:#c084fc;text-transform:uppercase;margin-top:6px;font-weight:bold;letter-spacing:0.5px}
.post{background:#161922;border:1px solid #222533;border-radius:12px;padding:14px;margin-bottom:12px}
.post-header{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.post-user{font-weight:700;color:#e5e7eb}
.post-time{color:#6b7280}
.compose{padding:16px;border-top:1px solid #1f2937;display:flex;gap:8px;background:#0d0e12}
.compose input{flex:1;background:#161922;border:1px solid #222533;border-radius:8px;padding:12px;color:#fff;font-size:14px}
.compose button{background:#7c3aed;border:none;color:#fff;padding:12px 20px;border-radius:8px;font-weight:600;cursor:pointer;transition:0.2s}
.compose button:hover{background:#6d28d9}
.compose button:disabled{background:#1f2937;color:#4b5563;cursor:not-allowed}
.badge{background:#7c3aed;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase}
.error{background:#dc2626;color:#fff;padding:12px;border-radius:8px;margin:16px;text-align:center;font-size:14px}
</style>
</head>
<body>

<header>
  <h1>IAM Addon <span id="identity-badge"></span></h1>
  <button id="auth-btn" onclick="handleAuthAction()" style="background:#1f2937;border:none;color:#9ca3af;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer">Sign In</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('feed')">Domain Feed</div>
  <div class="tab" onclick="switchTab('chat')">Live Grid Chat</div>
</div>

<main id="feed-tab">
  <div class="card spiritual-banner" id="angel-banner">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;font-weight:bold;color:#c084fc;text-transform:uppercase;">👼 Angelic Oversight</span>
      <span id="active-domain-txt">pinwheel.local</span>
    </div>
    <div class="angel-response" id="angel-message">Seeking spiritual alignment...</div>
    <div class="scripture" id="angel-scripture"></div>
  </div>
  <div id="entries-container"></div>
</main>

<main id="chat-tab" style="display:none">
  <div id="chat-container"></div>
</main>

<div id="error" class="error" style="display:none"></div>

<div class="compose">
  <input id="msg-input" placeholder="Please sign in to interact..." disabled onkeypress="if(event.key==='Enter')submitData()">
  <button id="submit-btn" onclick="submitData()" disabled>Speak</button>
</div>

<footer style="padding:24px 16px;border-top:1px solid #1f2937;background:#0d0e12;text-align:center;font-size:12px;color:#6b7280;">
  <p>Made with <span style="color:#c084fc;">Gemini</span></p>
  <p style="margin-top:6px;"><a href="https://gemini.google.com" target="_blank" rel="noopener noreferrer" style="color:#9ca3af;text-decoration:none;">gemini.google.com</a></p>
</footer>
<script>
const SUPABASE_URL = 'https://ppzbmpyhikkrahonwpm.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwemJtcHloaWtrcmFocW9ud3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MDY1MzYsImV4cCI6MjA5NDk4MjUzNn0.csWZWPpF60JMecwAaMqDVCiuhp8SbxEstOkGoS1csp4'
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let user = null
let currentDomain = 'pinwheel.local'
let currentTab = 'feed'

db.auth.onAuthStateChange(async (event, session) => {
  user = session?.user || null
  const authBtn = document.getElementById('auth-btn')
  const msgInput = document.getElementById('msg-input')
  const submitBtn = document.getElementById('submit-btn')

  if (user) {
    authBtn.innerText = "Sign Out"
    document.getElementById('identity-badge').innerHTML = '<span class="badge">🛡️ Guided Grid</span>'
    msgInput.disabled = false; submitBtn.disabled = false
    msgInput.placeholder = "Type your message..."
    detectBrowserContext()
  } else {
    authBtn.innerText = "Sign In"
    document.getElementById('identity-badge').innerHTML = ''
    msgInput.disabled = true; submitBtn.disabled = true
    msgInput.placeholder = "Please sign in to interact..."
    syncDomainState()
  }
})

function detectBrowserContext() {
  if (typeof chrome !== 'undefined' && chrome.tabs) {
    chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
      if (tabs[0] && tabs[0].url) {
        currentDomain = new URL(tabs[0].url).hostname.replace('www.', '');
        syncDomainState();
      }
    });
  } else {
    syncDomainState();
  }
}

async function syncDomainState() {
  document.getElementById('active-domain-txt').innerText = currentDomain;
  await loadAngelGuidance();
  await loadGuestbookEntries();
  await loadChatMessages();
}

async function loadAngelGuidance() {
  const { data } = await db.from('angel_guidance').select('*').limit(1).single();
  if (data) {
    document.getElementById('angel-message').innerText = `"${data.angel_response}"`;
    document.getElementById('angel-scripture').innerText = `${data.scripture || ''} — ${data.prayer || ''}`;
  } else {
    document.getElementById('angel-message').innerText = `"Fear not, for I walk before you on this domain path."`;
    document.getElementById('angel-scripture').innerText = "Isaiah XLI:X";
  }
}

async function loadGuestbookEntries() {
  const { data } = await db.from('guestbook_entries').select('*').eq('canonical_url', currentDomain).order('created_at', { ascending: false }).limit(20);
  document.getElementById('entries-container').innerHTML = (data || []).map(entry => `
    <div class="post">
      <div class="post-header">
        <span class="post-user">🕊️ ${entry.author_display_name}</span>
        <span class="post-time">${new Date(entry.created_at).toLocaleTimeString()}</span>
      </div>
      <div style="font-size:14px;">${entry.body}</div>
    </div>
  `).join('') || '<div style="color:#4b5563;text-align:center;padding:32px;font-size:13px;">No domain records spoken yet.</div>';
}

async function loadChatMessages() {
  const { data } = await db.from('chat_messages').select('*').order('created_at', { ascending: false }).limit(25);
  document.getElementById('chat-container').innerHTML = (data || []).map(msg => `
    <div class="post" style="border-left:3px solid #7c3aed;">
      <div class="post-header">
        <span class="post-user">💬 ${msg.user_email.split('@')[0]}</span>
        <span class="post-time">${new Date(msg.created_at).toLocaleTimeString()}</span>
      </div>
      <div style="font-size:14px;">${msg.message}</div>
    </div>
  `).join('') || '<div style="color:#4b5563;text-align:center;padding:32px;font-size:13px;">Chat grid is silent.</div>';
}

async function submitData() {
  if (!user) return;
  const input = document.getElementById('msg-input');
  const bodyText = input.value.trim();
  if (!bodyText) return;

  if (currentTab === 'feed') {
    const { error } = await db.from('guestbook_entries').insert({
      canonical_url: currentDomain,
      author_id: user.id,
      author_display_name: user.user_metadata?.name || user.email.split('@')[0],
      body: bodyText
    });
    if (error) showErr(error.message);
    else { input.value = ''; await loadGuestbookEntries(); }
  } else {
    const { error } = await db.from('chat_messages').insert({
      user_id: user.id,
      user_email: user.email,
      message: bodyText
    });
    if (error) showErr(error.message);
    else { input.value = ''; await loadChatMessages(); }
  }
}

function switchTab(target) {
  currentTab = target;
  document.querySelectorAll('.tab').forEach((el, idx) => el.classList.toggle('active', (idx === 0 && target === 'feed') || (idx === 1 && target === 'chat')));
  document.getElementById('feed-tab').style.display = target === 'feed' ? 'flex' : 'none';
  document.getElementById('chat-tab').style.display = target === 'chat' ? 'flex' : 'none';
}

function showErr(m) {
  const e = document.getElementById('error');
  e.textContent = m; e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 4000);
}

function handleAuthAction() {
  if (user) {
    db.auth.signOut();
  } else {
    db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://bubby81fox-star.github.io' }
    });
  }
}
</script>
</body>
</html>
